料理名稱<br> <input id="name"><br><br>

食材 (每行一個)<br>

<textarea id="ingredients" rows="5"></textarea><br><br>

步驟 (每行一個)<br>

<button onclick="addRecipe()">新增料理</button>

<p id="status"></p>

<script>

const TOKEN="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";
const REPO="michael6058/life-system";
const FILE="data/recipes.json";

async function addRecipe(){

try{

let name=document.getElementById("name").value;

let ingredients=document
.getElementById("ingredients")
.value
.split("\n")
.filter(x=>x.trim()!="");

let steps=document
.getElementById("steps")
.value
.split("\n")
.filter(x=>x.trim()!="");

let favorite=document.getElementById("favorite").checked;

let newRecipe={
name:name,
ingredients:ingredients,
steps:steps,
favorite:favorite
};

let url=`https://api.github.com/repos/${REPO}/contents/${FILE}`;

let res=await fetch(url,{
headers:{
Authorization:`Bearer ${TOKEN}`
}
});

let data=await res.json();

console.log(data);

let content=JSON.parse(atob(data.content));

if(!Array.isArray(content)) content=[content];

content.push(newRecipe);

let updated=btoa(JSON.stringify(content,null,2));

let result=await fetch(url,{
method:"PUT",
headers:{
Authorization:`Bearer ${TOKEN}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"add recipe",
content:updated,
sha:data.sha
})
});

let resultData=await result.json();

console.log(resultData);

document.getElementById("status").innerText="新增成功";

}catch(e){

console.error(e);
alert(e);

}

}
