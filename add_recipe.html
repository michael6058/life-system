<h1>新增料理</h1>

料理名稱<br> <input id="name"><br><br>

食材 (每行一個)<br>

<textarea id="ingredients" rows="5"></textarea><br><br>

步驟 (每行一個)<br>

<textarea id="steps" rows="5"></textarea><br><br>

常用料理 <input type="checkbox" id="favorite"><br><br>

<button onclick="addRecipe()">新增料理</button>

<script>

const TOKEN = "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";
const REPO = "michael6058/life-system";
const FILE = "data/recipes.json";

async function addRecipe() {

try {

const name = document.getElementById("name").value;

const ingredients = document
.getElementById("ingredients")
.value
.split("\n")
.filter(x => x.trim() !== "");

const steps = document
.getElementById("steps")
.value
.split("\n")
.filter(x => x.trim() !== "");

const favorite = document.getElementById("favorite").checked;

const newRecipe = {
name: name,
ingredients: ingredients,
steps: steps,
favorite: favorite
};

const url = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

const res = await fetch(url, {
headers: {
Authorization: `Bearer ${TOKEN}`
}
});

console.log(res.status);

const data = await res.json();

let base64 = data.content.replace(/\n/g,"");
let content = JSON.parse(atob(base64));

if (!Array.isArray(content)) {
content = [content];
}

content.push(newRecipe);

const updated = btoa(JSON.stringify(content, null, 2));

const result = await fetch(url, {
method: "PUT",
headers: {
Authorization: `Bearer ${TOKEN}`,
"Content-Type": "application/json"
},
body: JSON.stringify({
message: "add recipe",
content: updated,
sha: data.sha
})
});

const resultData = await result.json();

console.log(resultData);

document.getElementById("status").innerText = "新增成功";

} catch (err) {

console.error(err);
alert(err);

}

}

</script>
